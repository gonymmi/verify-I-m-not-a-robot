<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>reCAPTCHA 데모</title>

<!-- ====================================================
  ✅ 수정할 곳은 딱 2곳뿐입니다!
  
  1. 아래 YOUR_SITE_KEY  → 사이트 키로 교체
  2. 아래 YOUR_SECRET_KEY → 비밀 키로 교체 (서버 코드에서만 사용)
  
  Google reCAPTCHA 콘솔: https://www.google.com/recaptcha/admin
===================================================== -->

<script>
  var SITE_KEY   = "6Le6Rs4sAAAAAEt-zEvtFs6IqXtTpusHprQRR9UO";    // ← 여기에 사이트 키 붙여넣기
  var SECRET_KEY = "6Le6Rs4sAAAAAFcs5uVeNt-Qi3oOBqQnEJGx23Nz";  // ← 여기에 비밀 키 붙여넣기 (서버 검증용)
</script>

<!-- Google reCAPTCHA 공식 스크립트 -->
<script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:24px;
  background:#eef2f7;
}

/* ── 폼 카드 ── */
.card{
  background:#fff;
  border:1px solid #dadce0;
  border-radius:8px;
  width:360px;
  padding:36px 32px 28px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.card h1{
  font-size:1.35rem;font-weight:600;
  color:#202124;text-align:center;margin-bottom:4px;
}
.card .sub{
  font-size:13px;color:#5f6368;
  text-align:center;margin-bottom:24px;
}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:500;color:#3c4043;margin-bottom:5px;}
.field input{
  width:100%;padding:10px 13px;
  border:1px solid #dadce0;border-radius:4px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:#202124;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.15);}

/* reCAPTCHA 위젯 영역 */
.recaptcha-area{
  margin:20px 0;
  display:flex;justify-content:center;
  min-height:78px;
  align-items:center;
}

/* 성공 배너 */
.success{
  display:none;
  background:#e6f4ea;
  border-left:4px solid #34a853;
  border-radius:3px;
  padding:11px 14px;
  font-size:13px;color:#137333;font-weight:500;
  margin-bottom:14px;
  animation:fadeUp .3s ease;
}
.success.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* 에러 배너 */
.errmsg{
  display:none;
  background:#fce8e6;
  border-left:4px solid #c5221f;
  border-radius:3px;
  padding:11px 14px;
  font-size:13px;color:#c5221f;font-weight:500;
  margin-bottom:14px;
}
.errmsg.on{display:block;}

/* 제출 버튼 */
.btn{
  width:100%;background:#1a73e8;color:#fff;
  border:none;border-radius:4px;
  padding:11px;font-size:14px;font-weight:600;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:background .2s;
  letter-spacing:.2px;
}
.btn:hover{background:#1558b0;}
.btn:disabled{background:#a8c7fa;cursor:default;}

/* 로딩 스피너 (reCAPTCHA 로드 전) */
.loading-cap{
  width:22px;height:22px;
  border:3px solid #e0e0e0;
  border-top-color:#4a90d9;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 키 미설정 안내 */
.no-key{
  font-size:12px;color:#c5221f;
  background:#fce8e6;border-radius:4px;
  padding:8px 12px;text-align:center;
}
</style>
</head>
<body>

<div class="card">
  <h1>🔐 로그인</h1>
  <p class="sub">계정에 로그인하세요</p>

  <div class="success" id="successMsg">✅ 인증이 완료되었습니다!</div>
  <div class="errmsg"  id="errMsg"></div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="example@gmail.com" required/>
    </div>
    <div class="field">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" name="password" placeholder="비밀번호 입력" required/>
    </div>

    <!-- reCAPTCHA 렌더링 위치 -->
    <div class="recaptcha-area">
      <div id="recaptchaWidget">
        <div class="loading-cap" id="capLoader"></div>
      </div>
    </div>

    <button type="submit" class="btn" id="submitBtn" disabled>로그인</button>
  </form>
</div>

<script>
/* ═══════════════════════════════════════════════════
   reCAPTCHA 동적 렌더링
   – api.js가 로드되면 onRecaptchaLoad() 자동 호출됨
═══════════════════════════════════════════════════ */
var captchaToken = '';

function onRecaptchaLoad() {
  // 키가 기본값이면 안내 표시
  if (SITE_KEY === 'YOUR_SITE_KEY') {
    document.getElementById('capLoader').style.display = 'none';
    document.getElementById('recaptchaWidget').innerHTML =
      '<div class="no-key">⚠️ SITE_KEY를 설정해주세요</div>';
    return;
  }

  document.getElementById('capLoader').style.display = 'none';

  grecaptcha.render('recaptchaWidget', {
    sitekey:          SITE_KEY,
    callback:         onVerified,       // 인증 성공
    'expired-callback': onExpired,      // 만료
    'error-callback':   onCapError      // 오류
  });
}

// ✅ 인증 성공
function onVerified(token) {
  captchaToken = token;
  document.getElementById('submitBtn').disabled = false;
  showSuccess('✅ 인증이 완료되었습니다!');
  hideErr();
}

// ⏰ 만료
function onExpired() {
  captchaToken = '';
  document.getElementById('submitBtn').disabled = true;
  hideSuccess();
  showErr('⚠️ reCAPTCHA가 만료되었습니다. 다시 인증해주세요.');
}

// ❌ 오류
function onCapError() {
  captchaToken = '';
  showErr('❌ reCAPTCHA 오류. 네트워크를 확인해주세요.');
}

/* ═══════════════════════════════════════════════════
   폼 제출
═══════════════════════════════════════════════════ */
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideErr(); hideSuccess();

  var email = document.getElementById('email').value.trim();
  var pw    = document.getElementById('pw').value;

  if (!email)                         { showErr('이메일을 입력해주세요.'); return; }
  if (!/\S+@\S+\.\S+/.test(email))   { showErr('이메일 형식이 올바르지 않습니다.'); return; }
  if (!pw)                            { showErr('비밀번호를 입력해주세요.'); return; }
  if (!captchaToken)                  { showErr('reCAPTCHA 인증을 먼저 완료해주세요.'); return; }

  /* ──────────────────────────────────────────
     🔽 서버로 전송하는 부분
     실제 서버가 있다면 아래 fetch 코드를 사용하세요.

     서버에서는 아래처럼 비밀 키로 토큰을 검증합니다:
     POST https://www.google.com/recaptcha/api/siteverify
       ?secret=YOUR_SECRET_KEY
       &response=captchaToken

     Node.js 예시:
       const res = await fetch(
         `https://www.google.com/recaptcha/api/siteverify?secret=${SECRET}&response=${token}`,
         { method:'POST' }
       );
       const { success } = await res.json();
  ────────────────────────────────────────── */

  // 서버 연동 예시 (주석 해제해서 사용)
  /*
  try {
    var resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pw, 'g-recaptcha-response': captchaToken })
    });
    var data = await resp.json();
    if (data.success) {
      showSuccess('✅ 로그인 성공!');
      // window.location.href = '/dashboard';
    } else {
      showErr(data.message || '로그인 실패');
      grecaptcha.reset(); captchaToken = '';
      document.getElementById('submitBtn').disabled = true;
    }
  } catch(err) {
    showErr('서버 연결 오류: ' + err.message);
  }
  */

  // 서버 없는 데모 환경 → 성공 처리
  showSuccess('✅ 인증이 완료되었습니다!');
});

/* ═══════════════════════════════════════════════════
   유틸
═══════════════════════════════════════════════════ */
function showSuccess(msg){
  var el=document.getElementById('successMsg');
  el.textContent=msg; el.classList.add('on');
}
function hideSuccess(){ document.getElementById('successMsg').classList.remove('on'); }

function showErr(msg){
  var el=document.getElementById('errMsg');
  el.textContent=msg; el.classList.add('on');
}
function hideErr(){ document.getElementById('errMsg').classList.remove('on'); }
</script>

</body>
</html>
